<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>지원금 올데이 새로고침</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7f8;
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, calc(100% - 40px));
        padding: 28px;
        border: 1px solid #dce5e8;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 16px 44px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #60717b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>새 화면을 불러오고 있습니다</h1>
      <p>저장된 이전 화면을 정리한 뒤 지원금 올데이로 이동합니다.</p>
    </main>
    <script>
      (async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          localStorage.removeItem("jiwon24:lastCategory");
          sessionStorage.clear();
        } catch (error) {
          console.warn("Cache reset skipped", error);
        } finally {
          location.replace("./?source=reset&appv=20260618-nav2");
        }
      })();
    </script>
  </body>
</html>
